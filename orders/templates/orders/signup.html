<!DOCTYPE html>
<html>
<head>
    <title>Officer Registration</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2b3a2a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .box { background: #1e271e; padding: 30px; border-radius: 8px; border: 2px solid #cd7f32; width: 400px; }
        h2 { text-align: center; color: #cd7f32; margin-top: 0; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #444; background: #2d382d; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #cd7f32; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        a { color: #cd7f32; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Officer Registration Profile</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Establish Secure Account</button>
        </form>
        <p style="margin-top: 15px; text-align: center; font-size: 14px;">Already registered? <a href="{% url 'login' %}">Return to Login</a></p>
    </div>
</body>
</html>
